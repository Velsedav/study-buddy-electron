name: Build & Release Study Buddy (Electron)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: Windows
          - platform: ubuntu-22.04
            label: Linux

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libasound2 python3-setuptools

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build app
        run: npm run build

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: npx electron-builder --linux deb AppImage --publish never

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: npx electron-builder --win nsis --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: |
            release/*.deb
            release/*.AppImage
            release/*.exe
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/**/*
          body: |
            ## Study Buddy ${{ github.ref_name }} (Electron)

            ### Downloads
            - **Windows**: `.exe` NSIS installer
            - **Linux**: `.deb` package or `.AppImage`

            ### Installation
            - **Windows**: Run the `.exe` installer
            - **Linux (.deb)**: `sudo dpkg -i study-buddy_*.deb`
            - **Linux (.AppImage)**: `chmod +x Study*.AppImage && ./Study*.AppImage`
